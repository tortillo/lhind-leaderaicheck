<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0B1622" />
    <title>LHIND · AI Leadership Check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" />
    <style>
      /* Instant splash shown before the JS bundle loads and React mounts.
         It lives inside #root, so React replaces it automatically on mount —
         no extra JS needed. Prevents the "blank page, looks broken" feeling. */
      html, body { margin: 0; background: #0B1622; }
      #boot {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 22px;
        background: #0B1622; color: #E8F0F6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #boot .brand {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; color: #F5A623;
      }
      #boot .title { font-size: 20px; font-weight: 800; color: #E8F0F6; }
      #boot .ring {
        width: 38px; height: 38px; border-radius: 50%;
        border: 3px solid #1F3A52; border-top-color: #36C9D9;
        animation: spin 0.9s linear infinite;
      }
      #boot .hint { font-size: 13px; color: #8AA6BC; max-width: 280px; text-align: center; line-height: 1.5; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="brand">LHIND</div>
        <div class="ring"></div>
        <div class="title">AI&nbsp;Check wird geladen…</div>
        <div class="hint">Einen Moment bitte — die Anwendung startet. / Loading the application, one moment please.</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
