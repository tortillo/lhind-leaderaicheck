name: Auto Release

# Runs on every push to main. Bumps the version, updates releases.json +
# package.json, commits them back, and creates a matching GitHub Release.
on:
  push:
    branches: [main]

# Allow the workflow to push commits and create releases.
permissions:
  contents: write

# If several pushes arrive quickly, let the latest finish and cancel older runs.
concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    # Safety net: never run on the bot's own version-bump commit (prevents loops).
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') }}

    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version & update release notes
        id: bump
        run: node scripts/bump-version.mjs

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/releases.json package.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]" || echo "nothing to commit"
          git push

      - name: Create tag
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }} — ${{ steps.bump.outputs.version }}"
          body: ${{ steps.bump.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
